# Brings up the WHOLE ZhytoMate stack with one command: `docker compose up -d --build`.
#
# `postgres` + `ml` are hand-written here rather than pulled in via `include:` from
# ml-service/docker-compose.yml - Compose's `include` cannot cleanly override or cherry-pick a
# single service out of an included file (a same-named service collision is a warning, not a
# merge), so ml-service/docker-compose.yml stays untouched and fully usable standalone
# (see ml-service/README.md), and this file re-declares just the compose wiring for the same
# two services, reusing ml-service/Dockerfile via a relative build context.
#
# `postgres`'s port is deliberately NOT published to the host - only `ml` needs to reach it,
# over the internal Docker network by service name (postgres:5432), which sidesteps this
# machine's documented host-port-5432 collision entirely without needing an override file.
#
# No top-level `networks:` block, matching ml-service/docker-compose.yml's own existing
# convention - every service below only ever needs another service's name for DNS, which
# Compose's implicit default network already provides.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zhytomate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-zhytomate}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhytomate -d zhytomate"]
      interval: 5s
      timeout: 3s
      retries: 10

  ml:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-zhytomate}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-zhytomate}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-large}
      # Calibrated on the seeded KB (see ml-service/CLAUDE.md) - do not revert to 0.70/0.80.
      SIM_GATE: ${SIM_GATE:-0.50}
      SIM_HIGH: ${SIM_HIGH:-0.62}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-10}
      AGENT_RAG_ENABLED: ${AGENT_RAG_ENABLED:-false}
      AGENT_MAX_SUBQUERIES: ${AGENT_MAX_SUBQUERIES:-3}
      ANSWER_CACHE_TTL_SECONDS: ${ANSWER_CACHE_TTL_SECONDS:-120}
      ANSWER_CACHE_MAXSIZE: ${ANSWER_CACHE_MAXSIZE:-200}
      CLASSIFICATION_CACHE_TTL_SECONDS: ${CLASSIFICATION_CACHE_TTL_SECONDS:-30}
      CLASSIFICATION_CACHE_MAXSIZE: ${CLASSIFICATION_CACHE_MAXSIZE:-256}
      EMBED_CACHE_MAXSIZE: ${EMBED_CACHE_MAXSIZE:-1000}
      RRF_K: ${RRF_K:-60}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/ready').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    # ML is an internal service. The public entry point is backend -> ml on the Compose network.

  # Both Mongo databases are managed outside this Compose project.

  backend:
    build:
      context: .
      dockerfile: backend_app/Dockerfile
      args:
        # Leave empty for same-origin local deployments; set the public API subdomain in prod.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      MONGO_URI: ${APP_MONGO_URI:?Set APP_MONGO_URI to the app MongoDB connection string}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ML_BASE_URL: http://ml:8000
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
      DEMO_USER_SEED_PASSWORD: ${DEMO_USER_SEED_PASSWORD:-}
      DEMO_USER2_SEED_PASSWORD: ${DEMO_USER2_SEED_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://zhytomate.2voby.fun,http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      ml:
        condition: service_healthy
    ports:
      # Host Nginx is the only public entry point. Keep the port bound to loopback.
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/openapi.json').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - backend_uploads:/app/backend_app/uploads

  # Collector runs web sources without requiring Telegram credentials. Telegram ingestion is
  # enabled automatically when TG_API_ID/TG_API_HASH/TG_SESSION are configured.
  parser:
    build:
      context: ./parser
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGO_URI: ${PARSER_MONGO_URI:?Set PARSER_MONGO_URI to the parser MongoDB connection string}
      PLACES_MONGO_URI: ${APP_MONGO_URI:?Set APP_MONGO_URI to the app MongoDB connection string}
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      TG_SESSION: ${TG_SESSION}
      DNS_SERVERS: ${DNS_SERVERS:-1.1.1.1,8.8.8.8}
      SCRAPER_DEDUPE_RESERVATION_TTL_MINUTES: ${SCRAPER_DEDUPE_RESERVATION_TTL_MINUTES:-30}
      AI_LAYER_ENABLED: ${AI_LAYER_ENABLED:-false}
      AI_PROVIDER: ${AI_PROVIDER:-placeholder}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.1}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-900}
      AI_FAIL_OPEN: ${AI_FAIL_OPEN:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      RAG_URL: http://ml:8000/api/v1/knowledge/ingest
      RAG_SEND_ENABLED: ${RAG_SEND_ENABLED:-true}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      NEWS_API_URL: http://backend:3000/news/ingest
      NEWS_SEND_ENABLED: ${NEWS_SEND_ENABLED:-true}
      RAG_BACKFILL_NEWS_TTL_DAYS: ${RAG_BACKFILL_NEWS_TTL_DAYS:-120}
      ZHYTOMYR_INFO_BACKFILL_DAYS: ${ZHYTOMYR_INFO_BACKFILL_DAYS:-90}
      ZHYTOMYR_INFO_MAX_PAGES: ${ZHYTOMYR_INFO_MAX_PAGES:-120}
      ZHYTOMYR_INFO_MAX_ITEMS: ${ZHYTOMYR_INFO_MAX_ITEMS:-2000}
      ZHYTOMYR_INFO_CONCURRENCY: ${ZHYTOMYR_INFO_CONCURRENCY:-6}
      ZT_RADA_BACKFILL_DAYS: ${ZT_RADA_BACKFILL_DAYS:-1095}
      ZT_RADA_MAX_PAGES: ${ZT_RADA_MAX_PAGES:-0}
      ZT_RADA_MAX_ITEMS: ${ZT_RADA_MAX_ITEMS:-0}
      ZT_RADA_ATTACHMENT_LIMIT_PER_PAGE: ${ZT_RADA_ATTACHMENT_LIMIT_PER_PAGE:-0}
      ZT_RADA_DOCUMENT_ATTACHMENT_LIMIT_PER_PAGE: ${ZT_RADA_DOCUMENT_ATTACHMENT_LIMIT_PER_PAGE:-0}
      ZT_RADA_CONCURRENCY: ${ZT_RADA_CONCURRENCY:-8}
      ZT_RADA_ATTACHMENT_CONCURRENCY: ${ZT_RADA_ATTACHMENT_CONCURRENCY:-4}
      TG_BACKFILL_ON_START: ${TG_BACKFILL_ON_START:-true}
      TG_BACKFILL_LIMIT: ${TG_BACKFILL_LIMIT:-1000}
      PLACES_IMPORT_ENABLED: ${PLACES_IMPORT_ENABLED:-false}
      PLACES_IMPORT_DRY_RUN: ${PLACES_IMPORT_DRY_RUN:-false}
      PLACES_IMPORT_SCHEDULE: ${PLACES_IMPORT_SCHEDULE:-0 3 * * *}
      OVERPASS_URL: ${OVERPASS_URL:-https://overpass-api.de/api/interpreter}
      PLACES_BBOX: ${PLACES_BBOX:-50.20,28.60,50.30,28.75}
    depends_on:
      ml:
        condition: service_healthy
      # News now POSTs to the backend; wait for it to start (backend has no healthcheck, so
      # service_started rather than service_healthy). The parser's queue retries transient failures
      # regardless, so this is just start-order best-effort.
      backend:
        condition: service_started
    ports:
      # The parser subdomain is proxied here by the host Nginx. The service itself is not public.
      - "127.0.0.1:3002:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  places-sync:
    build:
      context: ./parser
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "scripts/places-worker.js"]
    environment:
      PLACES_MONGO_URI: ${APP_MONGO_URI:?Set APP_MONGO_URI to the app MongoDB connection string}
      OVERPASS_URL: ${OVERPASS_URL:-https://overpass-api.de/api/interpreter}
      PLACES_BBOX: ${PLACES_BBOX:-50.20,28.60,50.30,28.75}
      PLACES_IMPORT_SCHEDULE: ${PLACES_IMPORT_SCHEDULE:-0 3 * * *}
volumes:
  pgdata: {}
  backend_uploads: {}
