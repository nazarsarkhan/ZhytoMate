# Cloudflare Flexible SSL config.
# TLS terminates at Cloudflare; the origin server receives HTTP on port 80.
# Install as /etc/nginx/sites-available/zhytomate.conf and enable it.

upstream zhytomate_backend {
    server 127.0.0.1:3000;
}

upstream zhytomate_parser {
    server 127.0.0.1:3002;
}

# Cloudflare sends the original browser scheme in X-Forwarded-Proto. Preserve it for Express
# even though the Cloudflare-to-origin connection is HTTP in Flexible mode.
map $http_x_forwarded_proto $zhytomate_proto {
    default $scheme;
    http http;
    https https;
}

server {
    listen 80;
    listen [::]:80;
    server_name zhytomate.2voby.fun;

    location / {
        proxy_pass http://zhytomate_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $zhytomate_proto;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api-zhytomate.2voby.fun;

    location / {
        proxy_pass http://zhytomate_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $zhytomate_proto;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name parser-zhytomate.2voby.fun;

    location / {
        proxy_pass http://zhytomate_parser;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $zhytomate_proto;
    }
}
