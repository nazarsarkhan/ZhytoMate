# Production Nginx config. Obtain certificates first, then replace the temporary HTTP config
# with this file and run: nginx -t && systemctl reload nginx

upstream zhytomate_backend {
    server 127.0.0.1:3000;
}

upstream zhytomate_parser {
    server 127.0.0.1:3002;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name zhytomate.2voby.fun api-zhytomate.2voby.fun parser-zhytomate.2voby.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zhytomate.2voby.fun;

    ssl_certificate /etc/letsencrypt/live/zhytomate.2voby.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zhytomate.2voby.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;
    location / {
        proxy_pass http://zhytomate_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api-zhytomate.2voby.fun;

    ssl_certificate /etc/letsencrypt/live/zhytomate.2voby.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zhytomate.2voby.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;
    location / {
        proxy_pass http://zhytomate_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name parser-zhytomate.2voby.fun;

    ssl_certificate /etc/letsencrypt/live/zhytomate.2voby.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zhytomate.2voby.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://zhytomate_parser;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
