# ml-service/docker-compose.yml
# Runs the ML service + its Postgres dependency locally.
# Usage: docker-compose up --build
# The Node.js bot and Collector run separately and connect via network.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zhytomate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-zhytomate}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Liveness probe only — hardcoding the default user/db here is fine even if the
      # env vars above are overridden, since pg_isready just needs a role that can connect.
      test: ["CMD-SHELL", "pg_isready -U zhytomate -d zhytomate"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"   # expose for local psql / calibration script

  ml:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/ready').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s    # no local model to load anymore (OpenAI is a network call) — just DB connectivity + app startup
    ports:
      - "8000:8000"

volumes:
  pgdata: {}
