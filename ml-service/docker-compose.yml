# ml-service/docker-compose.yml
# Runs the ML service + its Postgres dependency locally.
# Usage: docker-compose up --build
# The Node.js bot and Collector run separately and connect via network.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: zhytomate
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: zhytomate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhytomate -d zhytomate"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"   # expose for local psql / calibration script

  ml:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/ready').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s    # generous: first start downloads nothing but loads ~1.1GB model
    ports:
      - "8000:8000"
    volumes:
      - hfcache:/home/app/.cache/huggingface   # model cache survives rebuilds

volumes:
  pgdata: {}
  hfcache: {}
