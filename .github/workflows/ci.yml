name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend_app/package-lock.json
      - run: npm ci
      - run: node --test test/*.test.js

  ml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev]'
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_app
    env:
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      INTERNAL_TOKEN: ci-internal-token
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'ci-openai-placeholder' }}
      RATE_LIMIT_PER_MINUTE: 100
      VITE_API_TARGET: http://localhost:3000
      RUN_LIVE_RAG: ${{ secrets.OPENAI_API_KEY != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend_app/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - name: Start backend and ML services for live tests
        if: env.RUN_LIVE_RAG == 'true'
        working-directory: .
        run: docker compose up -d --build mongo postgres ml backend
      - name: Wait for backend and ML health
        if: env.RUN_LIVE_RAG == 'true'
        working-directory: .
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:8000/health/ready >/dev/null \
              && curl --fail --silent http://localhost:3000/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs --tail=100 ml backend
          exit 1
      - run: npm run test:e2e
      - name: Stop backend and ML services
        if: always() && env.RUN_LIVE_RAG == 'true'
        working-directory: .
        run: docker compose down -v
